name: rag

services:
  db:
    image: pgvector/pgvector:0.8.1-pg18-trixie
    container_name: rag_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_dev
    ports:
      - "5432:5432"
    volumes:
      - rag_postgres_data:/var/lib/postgresql/data

volumes:
  rag_postgres_data:
